<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Flip</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="hidden">

  <img class="tube-overlay" src="assets/tube-overlay-border.png">

  <div class="wrapper">

    <div id="main-game-view">

      <div id="top-navigation">
        <div id="balance-display">$0</div>
        <div id="nav-buttons">
          <button id="stats-toggle-btn">STATS</button>
          <button id="shop-open-btn">SHOP</button>
        </div>
      </div>

      <div id="dashboard-layout">
        <div id="log-panel">
          <div class="panel-header">HISTORY</div>
          <div id="log-stream"></div>
        </div>

        <div id="game-area">
          <div class="title-wrapper">
            <h1 id="game-title">TWENTY STRAIGHT</h1>
            <div id="streak-banner">STREAK: 0 / 20</div>
          </div>
          <canvas id="coin-canvas" class="not-hidden" width="120" height="300"></canvas>
          <button id="flip-btn" class="not-hidden">FLIP COIN!</button>
        </div>

        <div class="layout-spacer"></div>
      </div>
    </div>

    <div id="shop-page-view" class="page-hidden">
      <div id="shop-navigation">
        <div id="shop-balance-display">$0</div>
        <button id="shop-close-btn">BACK</button>
      </div>
      <div class="shop-page-content">
        <h1 class="page-title">UPGRADE SHOP</h1>
        <div id="shop-container"></div>
      </div>
    </div>

    <div id="stats-modal" class="modal-hidden">
      <div class="modal-content">
        <div class="panel-header">SYSTEM ENGINE STATS</div>
        <div id="stats-data"></div>
        <button id="stats-close-btn">CLOSE</button>
      </div>
    </div>
  </div>

  <script type="module" src="./game/main.js"></script>
</body>

</html>
